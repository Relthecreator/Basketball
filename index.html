<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Base Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #60A3D9; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* BOTTOM UI BAR */
        #ui { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        .controls { display: flex; gap: 15px; pointer-events: auto; }
        .btn { background: #ff6b00; border: 2px solid white; color: white; padding: 12px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        /* SHOT METER */
        #shot-meter-container { width: 30px; height: 250px; background: rgba(0,0,0,0.7); border-radius: 15px; position: absolute; bottom: 120px; right: 25%; border: 3px solid #fff; display: none; overflow: hidden; transform: rotate(0deg); z-index: 20; }
        #shot-meter-fill { width: 100%; height: 0%; background: linear-gradient(to top, #ff9900, #ff0000); position: absolute; bottom: 0; left: 0; }
        #shot-meter-perfect { position: absolute; top: 0; width: 100%; height: 10%; background: rgba(0, 255, 0, 0.9); z-index: 2; }
        
        /* FEEDBACK UI */
        #feedback-panel { position: absolute; top: 15%; left: 50%; transform: translateX(-50%) scale(0.5); width: 280px; opacity: 0; background: #1a1a1a; text-align: center; border-radius: 4px; padding: 10px; transition: all 0.2s; z-index: 50; }
        .perfect-text { color: #00ff00; font-size: 24px; font-weight: bold; }
        .miss-text { color: #ff0000; font-size: 24px; font-weight: bold; }
        .good-text { color: #ffcc00; font-size: 24px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui">
        <div class="controls">
            <button class="btn" onclick="playAnim('crossover')">Cross (C)</button>
            <button class="btn" onclick="playAnim('return')">Return (V)</button>
            <button class="btn" onclick="playAnim('hesi')">Hesi (H)</button>
        </div>
        <div style="margin-top: 10px; text-shadow: 1px 1px 3px #000;">WASD Move | DRAG Rotate Camera | Hold SPACE Shoot/Dunk</div>
    </div>
    
    <div id="shot-meter-container">
        <div id="shot-meter-perfect"></div>
        <div id="shot-meter-fill"></div>
    </div>
    
    <div id="feedback-panel">
        <div id="fb-timing" class="perfect-text">PERFECT</div>
    </div>

    <script>
        // --- GLOBALS ---
        let scene, camera, renderer, controls;
        let player, ball, hoopGroup, backboardGlass, net;
        let playCustomAnim = false, customAnimTimer = 0, totalAnimDuration = 0, playbackArray = null;
        let isPlayerShooting = false, ballAttached = true, isDunking = false, isCharging = false;
        let shotPower = 0, shotDirection = 1, currentPerfectWidth = 10;
        let ballP0 = new THREE.Vector3(), ballP1 = new THREE.Vector3(), ballP2 = new THREE.Vector3();
        let ballAirTimer = 0, ballTotalAirTime = 1.0, isPerfectShot = false;
        let netSpring = 0, netVelocity = 0;
        const keys = { w: false, a: false, s: false, d: false };

        const materials = {
            skin: new THREE.MeshStandardMaterial({ color: 0x8d5524, roughness: 0.6 }),
            jersey: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 }), 
            shorts: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 }),
            shoes: new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.5 }),
            ball: new THREE.MeshStandardMaterial({ color: 0xd95c14, roughness: 0.4 })
        };

        // --- ANIMATION DATA ---
        const customCrossover = [{"duration":0.2,"pose":[3.3,0.2,0.15,-0.35,-0.1,-0.05,0.25,-0.1,-0.5,0,-0.4,0.1,0.1,-0.1,0.1],"ball":[0.4,1,1]},{"duration":0.2,"pose":[3.3,0.2,0.15,-0.35,-0.1,-0.05,0.25,-0.1,-0.5,0,-0.4,0.1,0.1,-0.1,0.1],"ball":[-1.1,3,1]},{"duration":0.1,"pose":[3.3,0.2,0.15,-0.2,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[-0.6,2.75,1.5]},{"duration":0.1,"pose":[3.3,0.2,0.15,0.15,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[-0.2,2,1.35]},{"duration":0.1,"pose":[3.3,0.35,0.15,0.15,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[0.1,1.55,1.35]},{"duration":0.2,"pose":[3.3,0.5,0.15,0.15,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[0.1,0.35,1.35]},{"duration":0.2,"pose":[3.3,0.5,0.15,0.15,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[1.6,1.8,1.35]},{"duration":0.2,"pose":[3.3,0.5,0.15,0.15,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[1.1,2.5,0.25]},{"duration":0.2,"pose":[3.3,0.5,0.15,0.15,-0.1,-0.4,0.25,-0.1,-0.45,0,-0.4,0.1,0.25,-0.1,0.1],"ball":[1.6,3,0]}];
        const customReturn = customCrossover.map(f => ({ duration: f.duration, pose: [f.pose[0], -f.pose[1], f.pose[2], -f.pose[3], f.pose[4], f.pose[8], f.pose[9], f.pose[10], f.pose[5], f.pose[6], f.pose[7], f.pose[13], f.pose[14], f.pose[11], f.pose[12]], ball: [-f.ball[0], f.ball[1], f.ball[2]] }));
        const customHesi = [ {"duration":0.2,"pose":[3.3,0.2,0.15,-0.35,-0.1,-0.05,0.25,-0.1,-0.5,0,-0.4,0.1,0.1,-0.1,0.1],"ball":[-1.1,3,1]}, {"duration":0.15,"pose":[3.2,0.35,0.25,0.15,-0.1,-0.2,0.2,-0.2,-0.4,0,-0.6,0.2,0.1,-0.2,0.2],"ball":[-0.4,1.8,1.3]}, {"duration":0.15,"pose":[3.0,0.5,0.3,0.3,-0.2,-0.4,0.1,-0.3,-0.2,0,-0.8,0.3,0.2,-0.3,0.3],"ball":[-0.2,0.35,1.5]}, {"duration":0.15,"pose":[3.2,0.1,0.2,0.0,-0.1,-0.1,0.2,-0.1,-0.6,0.0,0.15,1.2]}, {"duration":0.2,"pose":[3.3,0.2,0.15,-0.35,-0.1,-0.05,0.25,-0.1,-0.5,0,-0.4,0.1,0.1,-0.1,0.1],"ball":[-1.1,3,1]} ];
        const defaultDribble = [ {"duration":0.3,"pose":[3.3,0.0,0.2,0.0,0.0, 0.3,0.2,-0.1, 0.4,0.1,-0.4, 0.1,0.1,-0.1,0.1],"ball":[1.0, 2.0, 1.0]}, {"duration":0.3,"pose":[3.1,0.0,0.3,0.0,0.0, 0.2,0.2,-0.1, 0.1,0.1,-0.8, 0.3,0.4,-0.2,0.3],"ball":[1.0, 0.35, 1.2]} ];
        const customShoot = [ {"duration":0.1,"pose":[3.0, 0, 0.2, 0, 0.0,  0.0,0.2,-0.2,  0.0,0.2,-0.4,  0.2,0.4, -0.2,0.2],"ball":[-1.0, 1.5, 1.0]}, {"duration":0.2,"pose":[2.2, 0, 0.5, 0, -0.2,  -0.2,0.1,-1.2,  -0.2,0.1,-1.2,  0.8,1.2, 0.8,1.2],"ball":[0, 1.0, 1.2]}, {"duration":0.15,"pose":[3.2, 0, 0.0, 0, 0.3, -1.8,0.2,-2.2,  -1.8,0.2,-2.2,  0.1,0.2, 0.1,0.2],"ball":[0, 4.0, 1.2]}, {"duration":0.1,"pose":[4.4, 0, -0.1, 0, 0.5, -2.6,0.0,-0.1,  -2.6,0.0,-0.1,  -0.2,-0.1, -0.2,-0.1],"ball":[0, 5.8, 1.5]}, {"duration":0.5,"pose":[3.3, 0, 0.1, 0, 0.4,  -2.2,0.0,-0.3,  -2.2,0.0,-0.3,  0.1,0.2, 0.1,0.2],"ball":[0, 5.8, 1.5]} ];
        const customDunk = [ {"duration":0.15,"pose":[2.5, 0, 0.4, 0, -0.2,  -0.2,0.1,-1.5,  -0.2,0.1,-1.5,  0.8,1.2, 0.8,1.2],"ball":[0, 2.0, 1.2]}, {"duration":0.15,"pose":[6.5, 0, -0.2, 0, 0.5, -2.8,0.2,-0.2,  -2.8,0.2,-0.2,  0.1,0.2, -0.5,0.4],"ball":[0, 10.5, 1.2]}, {"duration":0.1,"pose":[6.2, 0, 0.3, 0, 0.3,  -0.5,0.2,-0.5,  -0.5,0.2,-0.5,  0.3,0.5, 0.0,0.2],"ball":[0, 7.0, 2.0]}, {"duration":0.3,"pose":[5.5, 0, 0.1, 0, 0.2,  -2.0,0.4,-0.8,  -2.0,0.4,-0.8,  0.5,1.0, 0.2,0.5],"ball":[0, 4.0, 2.0]}, {"duration":0.2,"pose":[3.3, 0, 0.1, 0, 0.0,   0.0,0.1,-0.5,   0.0,0.1,-0.5,  0.1,0.2, 0.1,0.2],"ball":[0, 2.0, 1.5]} ];
        
        let hips, pelvisMesh, torsoPivot, torsoMesh, neckPivot, headMesh;
        let leftShoulder, leftElbow, leftHand, rightShoulder, rightElbow, rightHand;
        let leftHip, leftKnee, leftFoot, rightHip, rightKnee, rightFoot;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x60A3D9);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, -20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; 
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.target.set(0, 4, -5);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambientLight);
            const spotLight = new THREE.SpotLight(0xffffff, 1.2); spotLight.position.set(20, 50, 20); spotLight.castShadow = true; scene.add(spotLight);

            // Court
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(70, 70), floorMat); floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
            
            const paintMat = new THREE.MeshStandardMaterial({ color: 0x2b4c7e }); 
            const paint = new THREE.Mesh(new THREE.PlaneGeometry(16, 19), paintMat); paint.rotation.x = -Math.PI/2; paint.position.set(0, 0.01, 3.5); scene.add(paint);

            // Hoop
            hoopGroup = new THREE.Group(); hoopGroup.position.set(0, 0, 13); scene.add(hoopGroup);
            const poleMat = new THREE.MeshStandardMaterial({color: 0x222222});
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 9.5, 16), poleMat); pole.position.set(0, 4.75, 2.0); hoopGroup.add(pole);
            const backboardMat = new THREE.MeshStandardMaterial({color: 0x88ccff, transparent: true, opacity: 0.4});
            backboardGlass = new THREE.Mesh(new THREE.BoxGeometry(4.6, 3.0, 0.12), backboardMat); backboardGlass.position.set(0, 8.8, 0); hoopGroup.add(backboardGlass);
            const rim = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 16, 32), new THREE.MeshStandardMaterial({color: 0xff3300})); rim.rotation.x = Math.PI/2; rim.position.set(0, 8.2, -0.75); hoopGroup.add(rim);

            // Simple Net
            net = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.35, 1.0, 16, 3, true), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })); 
            net.position.set(0, 7.7, -0.75); hoopGroup.add(net);

            // Player Rig
            function createLimb(w, h, d, mat, yOff) { const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat); m.position.y = yOff; const g = new THREE.Group(); g.add(m); return g; }
            player = new THREE.Group(); player.position.set(0, 0, -5); scene.add(player);
            hips = new THREE.Group(); hips.position.y = 3.2; player.add(hips); 
            pelvisMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 0.8), materials.shorts); hips.add(pelvisMesh);
            torsoPivot = new THREE.Group(); torsoPivot.position.y = 0.3; hips.add(torsoPivot); 
            torsoMesh = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.4, 0.7), materials.jersey); torsoMesh.position.y = 0.7; torsoPivot.add(torsoMesh);
            neckPivot = new THREE.Group(); neckPivot.position.y = 1.4; torsoPivot.add(neckPivot); 
            headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.9), materials.skin); headMesh.position.y = 0.45; neckPivot.add(headMesh);
            
            leftShoulder = new THREE.Group(); leftShoulder.position.set(0.85, 1.2, 0); torsoPivot.add(leftShoulder); 
            const leftU = createLimb(0.35, 1.0, 0.35, materials.skin, -0.4); leftShoulder.add(leftU); 
            leftElbow = new THREE.Group(); leftElbow.position.y = -0.9; leftU.add(leftElbow); 
            const leftL = createLimb(0.3, 1.0, 0.3, materials.skin, -0.4); leftElbow.add(leftL); 
            
            rightShoulder = new THREE.Group(); rightShoulder.position.set(-0.85, 1.2, 0); torsoPivot.add(rightShoulder); 
            const rightU = createLimb(0.35, 1.0, 0.35, materials.skin, -0.4); rightShoulder.add(rightU); 
            rightElbow = new THREE.Group(); rightElbow.position.y = -0.9; rightU.add(rightElbow); 
            const rightL = createLimb(0.3, 1.0, 0.3, materials.skin, -0.4); rightElbow.add(rightL); 
            
            leftHip = new THREE.Group(); leftHip.position.set(0.35, -0.2, 0); hips.add(leftHip); 
            const leftT = createLimb(0.45, 1.5, 0.45, materials.shorts, -0.75); leftHip.add(leftT); 
            leftKnee = new THREE.Group(); leftKnee.position.y = -1.5; leftT.add(leftKnee); 
            const leftC = createLimb(0.35, 1.5, 0.35, materials.skin, -0.75); leftKnee.add(leftC); 
            
            rightHip = new THREE.Group(); rightHip.position.set(-0.35, -0.2, 0); hips.add(rightHip); 
            const rightT = createLimb(0.45, 1.5, 0.45, materials.shorts, -0.75); rightHip.add(rightT); 
            rightKnee = new THREE.Group(); rightKnee.position.y = -1.5; rightT.add(rightKnee); 
            const rightC = createLimb(0.35, 1.5, 0.35, materials.skin, -0.75); rightKnee.add(rightC); 
            
            ball = new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32), materials.ball); player.add(ball);

            animate();
        }

        // --- GAMEPLAY LOGIC ---
        function playAnim(type) {
            if (isPlayerShooting) return;
            if (!ballAttached) { player.add(ball); ballAttached = true; }
            if (type === 'crossover') playbackArray = customCrossover; 
            else if (type === 'return') playbackArray = customReturn; 
            else if (type === 'hesi') playbackArray = customHesi; 
            totalAnimDuration = playbackArray.reduce((sum, frame) => sum + frame.duration, 0); customAnimTimer = 0; playCustomAnim = true;
        }

        function calculateInterpolation(time, array) {
            let accTime = 0, currIdx = 0, nextIdx = 1, localT = 0;
            for (let i = 0; i < array.length; i++) { if (time <= accTime + array[i].duration) { currIdx = i; nextIdx = Math.min(i + 1, array.length - 1); localT = (time - accTime) / array[i].duration; break; } accTime += array[i].duration; }
            if (time >= totalAnimDuration) { currIdx = array.length - 1; nextIdx = currIdx; localT = 1.0; }
            const fA = array[currIdx], fB = array[nextIdx], lerp = (a, b, t) => a + (b - a) * t;
            const interpPose = [], interpBall = []; for (let i = 0; i < 15; i++) interpPose.push(lerp(fA.pose[i], fB.pose[i], localT)); for (let i = 0; i < 3; i++) interpBall.push(lerp(fA.ball[i], fB.ball[i], localT)); return { pose: interpPose, ball: interpBall, index: currIdx };
        }

        function applyPoseArray(poseData, ballData) {
            hips.position.y = poseData[0]; hips.rotation.y = poseData[1]; torsoPivot.rotation.x = poseData[2]; torsoPivot.rotation.y = poseData[3]; neckPivot.rotation.x = poseData[4];
            leftShoulder.rotation.x = poseData[5]; leftShoulder.rotation.z = poseData[6]; leftElbow.rotation.x = poseData[7]; rightShoulder.rotation.x = poseData[8]; rightShoulder.rotation.z = poseData[9]; rightElbow.rotation.x = poseData[10];
            leftHip.rotation.x = poseData[11]; leftKnee.rotation.x = poseData[12]; rightHip.rotation.x = poseData[13]; rightKnee.rotation.x = poseData[14];
            if (ballAttached) ball.position.set(ballData[0], ballData[1], ballData[2]);
        }

        document.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true;
            if (e.code === 'Space' && !isCharging && !isPlayerShooting && !isDunking) {
                if (player.position.z > 8.0 && Math.abs(player.position.x) < 5.0) {
                    isDunking = true; playbackArray = customDunk;
                } else {
                    isCharging = true; shotPower = 0; document.getElementById('shot-meter-container').style.display = 'block';
                    currentPerfectWidth = Math.max(3, 20 - player.position.distanceTo(new THREE.Vector3(0, 0, 12.25)) * 0.9);
                    document.getElementById('shot-meter-perfect').style.height = currentPerfectWidth + '%'; playbackArray = customShoot;
                }
                if (!ballAttached) { player.add(ball); ballAttached = true; }
                totalAnimDuration = playbackArray.reduce((sum, frame) => sum + frame.duration, 0); customAnimTimer = 0; isPlayerShooting = true; playCustomAnim = true;
            }
            if (k === 'c') playAnim('crossover'); else if (k === 'v') playAnim('return'); else if (k === 'h') playAnim('hesi');
        });

        document.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false;
            if (e.code === 'Space' && isCharging) {
                isCharging = false; document.getElementById('shot-meter-container').style.display = 'none';
                isPerfectShot = (100 - shotPower <= currentPerfectWidth);
                
                const fp = document.getElementById('feedback-panel');
                document.getElementById('fb-timing').innerText = isPerfectShot ? "PERFECT" : "GOOD";
                document.getElementById('fb-timing').className = isPerfectShot ? "perfect-text" : "good-text";
                fp.style.opacity = '1'; fp.style.transform = 'translateX(-50%) scale(1.1)'; 
                setTimeout(() => { fp.style.transform = 'translateX(-50%) scale(1.0)'; }, 100); 
                setTimeout(() => { fp.style.opacity = '0'; }, 2000);
                if (customAnimTimer < 0.3) customAnimTimer = 0.3;
            }
        });

        const clock = new THREE.Clock(); const playerTarget = new THREE.Vector3(0, 0, 12.25); 

        function animate() {
            requestAnimationFrame(animate); const delta = Math.min(clock.getDelta(), 0.1); 

            let dx = 0, dz = 0; if (keys.w) dz += 1; if (keys.s) dz -= 1; if (keys.a) dx += 1; if (keys.d) dx -= 1; 
            if (dx !== 0 || dz !== 0) {
                const speed = isCharging ? 4.0 : 16.0; const len = Math.sqrt(dx*dx + dz*dz);
                player.position.x += (dx/len) * speed * delta; player.position.z += (dz/len) * speed * delta;
                if (!playCustomAnim && !isPlayerShooting) { playbackArray = defaultDribble; totalAnimDuration = playbackArray.reduce((sum, f) => sum + f.duration, 0); customAnimTimer = 0; playCustomAnim = true; }
            }
            player.lookAt(playerTarget);
            
            // Cleaned up Camera Tracking
            const playerCenter = new THREE.Vector3(player.position.x, player.position.y + 4, player.position.z);
            const playerDelta = new THREE.Vector3().subVectors(playerCenter, controls.target);
            camera.position.add(playerDelta);
            controls.target.copy(playerCenter);
            controls.update();

            netVelocity -= netSpring * 0.3; netVelocity *= 0.85; netSpring += netVelocity; net.scale.set(1 - netSpring * 0.3, 1 + netSpring, 1 - netSpring * 0.3);
            if (isCharging) { shotPower += delta * 250 * shotDirection; if (shotPower >= 100) { shotPower = 100; shotDirection = -1; } if (shotPower <= 0) { shotPower = 0; shotDirection = 1; } document.getElementById('shot-meter-fill').style.height = shotPower + '%'; }

            if (playCustomAnim) {
                customAnimTimer += delta;
                if (isDunking && isPlayerShooting) {
                    player.position.x += (0 - player.position.x) * 4.0 * delta; player.position.z += (11.0 - player.position.z) * 4.0 * delta;
                    if (ballAttached && customAnimTimer >= 0.3) {
                        ballAttached = false; ballAirTimer = 0; ball.getWorldPosition(ballP0); scene.add(ball); ball.position.copy(ballP0); 
                        isPerfectShot = true; netVelocity = 1.5; ballP2.set(0, 0.35, 12.25); ballP1.set(0, 5.0, 12.25); ballTotalAirTime = 0.35; 
                    }
                } else if (!isDunking && isPlayerShooting && !isCharging && ballAttached && customAnimTimer >= 0.45) {
                    ballAttached = false; ballAirTimer = 0; ball.getWorldPosition(ballP0); scene.add(ball); ball.position.copy(ballP0); 
                    if (isPerfectShot) { ballP2.set(0, 8.2, 12.25); } else { ballP2.set((Math.random()-0.5), 8.3 + Math.random()*0.5, 12.5 + (Math.random()-0.5)); }
                    const dist = ballP0.distanceTo(ballP2); ballP1.set((ballP0.x + ballP2.x)/2, Math.max(ballP0.y, ballP2.y) + 3.0 + (dist * 0.15), (ballP0.z + ballP2.z)/2); ballTotalAirTime = 0.5 + (dist * 0.035); 
                }
                if (customAnimTimer > totalAnimDuration) { playCustomAnim = false; if (!isPlayerShooting) applyPoseArray(playbackArray[playbackArray.length-1].pose, playbackArray[playbackArray.length-1].ball); } 
                else { const state = calculateInterpolation(customAnimTimer, playbackArray); if (isCharging && !isDunking && state.index === 1 && customAnimTimer > 0.4) customAnimTimer = 0.4; applyPoseArray(state.pose, state.ball); }
            }

            if (!ballAttached && isPlayerShooting) {
                ballAirTimer += delta; let t = ballAirTimer / ballTotalAirTime;
                if (t <= 1.0) {
                    const u = 1 - t, tt = t * t, uu = u * u;
                    ball.position.x = uu * ballP0.x + 2 * u * t * ballP1.x + tt * ballP2.x; ball.position.y = uu * ballP0.y + 2 * u * t * ballP1.y + tt * ballP2.y; ball.position.z = uu * ballP0.z + 2 * u * t * ballP1.z + tt * ballP2.z; ball.rotation.x += delta * 20;
                } else if (t > 2.0) {
                    isPlayerShooting = false; isDunking = false; player.add(ball); ballAttached = true; playAnim('crossover'); 
                } else if (t > 1.0) {
                    let postT = t - 1.0;
                    if (isPerfectShot) {
                        if (!isDunking && postT > 0 && postT < 0.1 && netSpring > -0.1 && netSpring < 0.1) netVelocity = 1.0; 
                        if (postT < 0.4) { ball.position.y = (isDunking ? 0.35 : 8.2) - (postT * 12); if (ball.position.y < 0.35) ball.position.y = 0.35; ball.position.z += delta * 1.5; } 
                        else { let bounceT = postT - 0.4; ball.position.y = 0.35 + Math.abs(Math.cos(bounceT * 6)) * 2.5 * Math.max(0, 1 - bounceT); ball.position.z += delta * 3.5; }
                    } else {
                        ball.position.y -= delta * 10; ball.position.z -= delta * 6; if (ball.position.y < 0.35) ball.position.y = 0.35; 
                    }
                }
            } else if (ballAttached) { ball.rotation.x += delta * 6; ball.rotation.y += delta * 3; }

            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }); 
        
        window.onload = init;
    </script>
</body>
